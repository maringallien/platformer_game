<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation Resizer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #181818;
        color: #ddd;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #0d0d0d;
        border-bottom: 1px solid #2a2a2a;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      header .legend {
        font-size: 12px;
        color: #888;
      }
      header .legend .swatch {
        display: inline-block;
        width: 12px;
        height: 8px;
        border: 1px solid #ff3355;
        margin: 0 4px -1px 0;
        vertical-align: middle;
      }
      #anim-resizer-canvas {
        display: block;
      }
      #anim-resizer-canvas canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Animation Resizer</h1>
      <span class="legend">
        <span class="swatch"></span>16×24 physics body (fixed in world space)
      </span>
    </header>
    <div id="anim-resizer-canvas"></div>
    <script type="module" src="./anim-resizer/main.ts"></script>
  </body>
</html>
